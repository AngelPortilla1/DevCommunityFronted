<div class="layout-root">
  <!-- Fondo con puntitos -->
  <div class="fixed inset-0 pointer-events-none opacity-20"
    style="background-image: radial-gradient(#059669 1px, transparent 1px); background-size: 32px 32px;">
  </div>

  <!-- ================== TOP BAR (siempre visible) ================== -->
  <header class="layout-topbar">
    <!-- Search bar -->
    <div class="search-bar">
      <div class="search-input-wrapper">
        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" placeholder="Buscar..." class="search-input">
      </div>
      <button class="search-btn">Buscar</button>
    </div>

    <!-- Acciones top -->
    <div class="topbar-actions">
      <button class="action-btn action-bell">
        <svg class="action-icon" fill="currentColor" viewBox="0 0 20 20">
          <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/>
        </svg>
      </button>
      <button class="action-btn action-chat">
        <svg class="action-icon" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/>
        </svg>
      </button>
      <button class="action-btn action-doc">
        <svg class="action-icon" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/>
        </svg>
      </button>
      <button class="action-btn-profile">
        <svg class="action-icon-profile" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ================== BODY: 3 columnas ================== -->
  <div class="layout-body">

    <!-- SIDEBAR IZQUIERDO -->
    <aside class="sidebar-left">
      <!-- Logo "MIS publicaciones" -->
      <div class="sidebar-logo">
        <h1 class="logo-text">
          MIS<br><span class="logo-accent">publicaciones</span>
        </h1>
      </div>

      <!-- Menú de Navegación -->
      <nav class="sidebar-nav">
        @for(item of navItems; track item.label) {
          <a [routerLink]="item.route"
             routerLinkActive="nav-active"
             [routerLinkActiveOptions]="{exact: false}"
             class="nav-item">
            <span class="nav-icon" [innerHTML]="item.icon"></span>
            <span class="nav-label">{{ item.label }}</span>
          </a>
        }
      </nav>
    </aside>

    <!-- FEED CENTRAL -->
    <main class="feed-main">
      <router-outlet></router-outlet>
    </main>

    <!-- SIDEBAR DERECHO: Trending Topics -->
    <aside class="sidebar-right">
      <h2 class="trending-title">Trending Topics</h2>
      <div class="trending-list">
        @for(topic of trendingTopics; track topic) {
          <button class="trending-item">
            <span class="trending-hash">#</span>
            <span class="trending-text">{{ topic.replace('# ', '') }}</span>
          </button>
        }
      </div>
    </aside>

  </div>
</div>
