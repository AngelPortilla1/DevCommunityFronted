<div class="min-h-screen bg-stone-50 font-sans p-4 md:p-8 overflow-x-hidden selection:bg-emerald-500 selection:text-white relative">
  <!-- Fondo con puntitos -->
  <div class="fixed inset-0 pointer-events-none opacity-20"
    style="background-image: radial-gradient(#059669 1px, transparent 1px); background-size: 32px 32px;">
  </div>

  <div class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-[260px_1fr_260px] gap-10 relative z-10">

    <!-- ================== LADO IZQUIERDO ================== -->
    <aside class="hidden lg:flex flex-col gap-8">
      <!-- Logo "MIS publicaciones" -->
      <div class="bg-slate-900 text-white px-6 py-5 rounded-br-[2.5rem] shadow-[8px_8px_0px_#059669] transform hover:scale-105 transition-transform duration-300 w-full max-w-[220px]">
        <h1 class="text-3xl font-black tracking-tighter uppercase leading-none">
          MIS<br><span class="text-emerald-400 font-serif italic lowercase">publicaciones</span>
        </h1>
      </div>

      <!-- Menú de Navegación -->
      <nav class="flex flex-col gap-3">
        @for(item of navItems; track item.label) {
          <a [routerLink]="item.route"
             routerLinkActive="!bg-emerald-700 !text-white !border-emerald-900 shadow-[4px_4px_0px_#059669] hover:!bg-emerald-800"
             [routerLinkActiveOptions]="{exact: false}"
             class="flex items-center gap-4 bg-slate-900 text-slate-100 px-6 py-4 rounded-xl font-black uppercase tracking-widest border-2 border-slate-900 shadow-[4px_4px_0px_#e2e8f0] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all w-full max-w-[220px]">
            <span class="text-emerald-400 flex items-center justify-center" [innerHTML]="item.icon"></span>
            <span class="text-[13px] mt-0.5">{{ item.label }}</span>
          </a>
        }
      </nav>
    </aside>

    <!-- ================== CENTRO (Feed) ================== -->
    <main class="flex flex-col min-w-0">
      
      <!-- Topbar -->
      <header class="flex flex-col xl:flex-row justify-between items-center mb-8 gap-4 xl:pl-8">
        
        <!-- Search bar -->
        <div class="relative w-full max-w-md flex h-12">
          <div class="flex-1 border-2 border-slate-900 rounded-l-2xl bg-white flex items-center px-4 shadow-[4px_4px_0px_#e2e8f0] z-10 relative left-1 group hover:border-emerald-600 transition-colors">
            <svg class="w-5 h-5 text-indigo-500 font-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" placeholder="Buscar..." 
              class="w-full bg-transparent p-2 outline-none text-slate-700 font-bold placeholder-slate-400">
          </div>
          <button class="bg-emerald-700 text-white px-8 font-black uppercase tracking-widest border-2 border-slate-900 rounded-2xl shadow-[4px_4px_0px_#e2e8f0] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none hover:bg-emerald-800 transition-all z-20 relative -ml-4">
            Buscar
          </button>
        </div>

        <!-- Acciones top -->
        <div class="flex gap-4">
          <!-- Notification -->
          <button class="w-12 h-12 bg-slate-900 text-amber-400 flex items-center justify-center rounded-2xl border-2 border-slate-900 shadow-[4px_4px_0px_#e2e8f0] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/></svg>
          </button>
          <!-- Messages -->
          <button class="w-12 h-12 bg-slate-900 text-stone-300 flex items-center justify-center rounded-2xl border-2 border-slate-900 shadow-[4px_4px_0px_#e2e8f0] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/></svg>
          </button>
          <!-- List -->
          <button class="w-12 h-12 bg-slate-900 text-pink-300 flex items-center justify-center rounded-2xl border-2 border-slate-900 shadow-[4px_4px_0px_#e2e8f0] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/></svg>
          </button>
          <!-- Profile -->
          <button class="w-12 h-12 bg-emerald-700 text-indigo-800 flex items-center justify-center rounded-full border-2 border-slate-900 shadow-[4px_4px_0px_#e2e8f0] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all ml-2">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
          </button>
        </div>

      </header>

      <!-- Aquí se inyectan las páginas (Posts) -->
      <div class="flex-1">
        <router-outlet></router-outlet>
      </div>

    </main>

    <!-- ================== LADO DERECHO ================== -->
    <!-- Estructura del Trending Topics Side Panel -->
    <aside class="hidden xl:flex flex-col gap-6 pl-4 mt-20">
      <h2 class="text-lg font-black uppercase tracking-widest text-slate-900 mb-2">Trending Topics</h2>
      
      <div class="flex flex-col gap-4">
        @for(topic of trendingTopics; track topic) {
          <button class="bg-white border-2 border-slate-900 px-5 py-3 rounded-[1.25rem] shadow-[4px_4px_0px_#e2e8f0] hover:shadow-[4px_4px_0px_#059669] hover:-translate-y-1 transition-all text-left flex items-center group">
            <span class="text-emerald-500 font-black mr-2 text-lg group-hover:scale-110 transition-transform">#</span>
            <span class="font-bold text-slate-700 text-sm tracking-wide">{{ topic.replace('# ', '') }}</span>
          </button>
        }
      </div>
    </aside>

  </div>
</div>
